name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build & Pack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Aspire workload
        run: dotnet workload install aspire

      - name: Restore
        run: dotnet restore templates/clean-arch/CleanArch.slnx

      - name: Build
        run: dotnet build templates/clean-arch/CleanArch.slnx -c Release --no-restore

      - name: Pack template
        run: dotnet pack clean-arch-template.csproj -c Release --no-build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: bin/Release/*.nupkg
